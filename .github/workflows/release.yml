name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Extract release notes for current tag
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"

          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture=1 }
            capture && $0 ~ "^## \\[[^]]+\\]" && $0 !~ "^## \\[" version "\\]" { exit }
            capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          test -s RELEASE_NOTES.md || { echo "No release notes found for version $version in CHANGELOG.md"; exit 1; }

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --notes-file RELEASE_NOTES.md \
            main.js manifest.json styles.css